version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: expense_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-expense_agent}
      POSTGRES_USER: ${POSTGRES_USER:-expense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis（缓存 + 任务队列）
  redis:
    image: redis:7-alpine
    container_name: expense_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MinIO（本地 OSS，替代阿里云 OSS 用于开发）
  minio:
    image: minio/minio:latest
    container_name: expense_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web 控制台
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
